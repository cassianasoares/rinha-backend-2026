version: "3.9"

services:
  api1:
    image: cassias18/rinha-backend-api-2026:latest
    container_name: fraud_api_1
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/ready')"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./app/data:/app/data:ro
    deploy:
      resources:
        limits:
          cpus: "0.4"
          memory: 150M
    networks:
      - fraud_net

  api2:
    image: cassias18/rinha-backend-api-2026:latest
    container_name: fraud_api_2
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/ready')"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./app/data:/app/data:ro
    deploy:
      resources:
        limits:
          cpus: "0.4"
          memory: 150M
    networks:
      - fraud_net

  nginx:
    image: nginx:alpine
    container_name: fraud_lb
    restart: always
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 50M
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
    networks:
      - fraud_net

networks:
  fraud_net:
    driver: bridge