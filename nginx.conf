events {
    worker_connections 4096;
}

http {
    upstream api_backend {
        server api1:8000;
        server api2:8000;
        keepalive 128;
    }

    server {
        listen 9999;

        location / {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }
}
